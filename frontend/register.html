<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Vibenet Register</title>

    <link rel="stylesheet" href="style.css">

</head>

<body class="auth-body">

    <div class="auth-container">

        <div class="auth-left">

            <h1 class="big-logo">
                Vibe<span>net</span>
            </h1>

            <p class="tagline">
                Join the vibe today ✨
            </p>

        </div>

        <div class="auth-box">

            <h2>
                Create Account
            </h2>

            <input
                type="text"
                id="name"
                placeholder="Enter Name"
            >

            <input
                type="email"
                id="email"
                placeholder="Enter Email"
            >

            <input
                type="password"
                id="password"
                placeholder="Enter Password"
            >

            <button onclick="register()">
                Register
            </button>

            <p>
                Already have an account?
                <a href="index.html">
                    Login
                </a>
            </p>

        </div>

    </div>

    <script src="app.js"></script>

</body>

</html>
